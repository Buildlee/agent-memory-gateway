name: 验证

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

permissions:
  contents: read

jobs:
  test:
    name: Windows 回归检查
    runs-on: windows-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装测试依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[mcp,postgres,dev]"

      - name: 运行自动化测试
        shell: pwsh
        run: python -m unittest discover -s tests

      - name: 编译与 PowerShell 语法检查
        shell: pwsh
        run: |
          python -m compileall -q src tests
          $errors = @()
          Get-ChildItem -LiteralPath scripts -Filter '*.ps1' -File | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors)
            $errors += $parseErrors
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: 检查公开文件是否包含敏感信息
        shell: pwsh
        run: .\scripts\check-public-sensitive.ps1

      - name: 检查补丁格式
        shell: pwsh
        run: git diff-tree --check -r HEAD
