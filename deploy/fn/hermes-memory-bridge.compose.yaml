services:
  hermes-memory-bridge:
    image: agent-memory-gateway:0.1.0
    restart: unless-stopped
    user: "1000:1001"
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"
    network_mode: "service:hermes-webui"
    depends_on:
      hermes-webui:
        condition: service_started
    entrypoint: ["/bin/sh", "-ec"]
    command: >-
      test -r /state/sidecar.env;
      export MEMORY_OUTBOX_KEY="$$(awk -F= '$$1 == "MEMORY_OUTBOX_KEY" { print $$2 }' /state/sidecar.env)";
      export MEMORY_OUTBOX_KEY_VERSION="$$(awk -F= '$$1 == "MEMORY_OUTBOX_KEY_VERSION" { print $$2 }' /state/sidecar.env)";
      test -n "$$MEMORY_OUTBOX_KEY";
      test -n "$$MEMORY_OUTBOX_KEY_VERSION";
      python -m agent_memory_gateway.sidecar_daemon --host 127.0.0.1 --port 8766 &
      exec python -m agent_memory_gateway.sidecar_mcp --transport streamable-http --host 127.0.0.1 --port 8767
    environment:
      MEMORY_GATEWAY_URL: ${HERMES_MEMORY_GATEWAY_URL:-http://gateway:8787}
      MEMORY_REFRESH_CREDENTIAL_FILE: /state/refresh-credential.json
      MEMORY_SIDECAR_ALLOWED_AGENTS: ${HERMES_MEMORY_AGENT_ID:?必须指定飞牛 Hermes 的 Agent 安装实例 ID}
      MEMORY_DEFAULT_WORKSPACE: ${HERMES_MEMORY_WORKSPACE:?必须指定默认工作区}
      MEMORY_DEVICE_ID: ${HERMES_MEMORY_DEVICE_ID:?必须指定飞牛 Hermes 设备 ID}
      MEMORY_HOME: /state/outbox
      MEMORY_SIDECAR_PORT: "8766"
    volumes:
      - type: bind
        source: ${HERMES_MEMORY_STATE_DIR:?必须指定飞牛 Hermes Sidecar 状态目录}
        target: /state
        read_only: false
